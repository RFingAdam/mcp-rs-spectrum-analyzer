<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320"
     role="img" aria-label="mcp-rs-spectrum-analyzer — Rohde &amp; Schwarz spectrum analyzer control (FSW / FSVA / FSV / FPL)">
  <title>mcp-rs-spectrum-analyzer — Rohde &amp; Schwarz spectrum analyzer control (FSW / FSVA / FSV / FPL)</title>

  <defs>
    <linearGradient id="t-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0B1220"/>
      <stop offset="50%"  stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>

    <filter id="t-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .accent        { color: #22D3EE; }
      .accent-stroke { stroke: #22D3EE; }
      .accent-fill   { fill:   #22D3EE; }
    </style>
  </defs>

  <rect width="1280" height="320" fill="url(#t-bg)"/>

  <g stroke="#1E293B" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40"  x2="1280" y2="40"/>
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
  </g>

  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="240" height="240" rx="44" ry="44"
          fill="#0B1220" stroke="#1E293B" stroke-width="1"/>

    <rect x="12" y="12" width="216" height="216" rx="34" ry="34"
          fill="none" stroke="#1E293B" stroke-width="1" opacity="0.7"/>

    <!-- g-scope: oscilloscope/spectrum screen + trace -->
    <g id="glyph-slot" transform="translate(40, 40)" filter="url(#t-glow)">
      <g fill="none" class="accent-stroke" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <rect x="16" y="24" width="128" height="92" rx="6" stroke-opacity="0.7"/>
        <line x1="16" y1="70"  x2="144" y2="70"  stroke-opacity="0.25"/>
        <line x1="80" y1="24"  x2="80"  y2="116" stroke-opacity="0.25"/>
        <line x1="48" y1="24"  x2="48"  y2="116" stroke-opacity="0.15"/>
        <line x1="112" y1="24" x2="112" y2="116" stroke-opacity="0.15"/>
        <path d="M 22 70 L 38 70 L 38 50 L 58 50 L 58 90 L 78 90 L 78 60 L 98 60 L 98 80 L 138 80"/>
        <line x1="40" y1="132" x2="120" y2="132" stroke-opacity="0.5"/>
        <circle cx="40"  cy="132" r="3" stroke-opacity="0.5"/>
        <circle cx="80"  cy="132" r="3" stroke-opacity="0.5"/>
        <circle cx="120" cy="132" r="3" stroke-opacity="0.5"/>
      </g>
    </g>
  </g>

  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">

    <!-- Wordmark — long name, 80px size variant -->
    <text x="320" y="160" font-size="80" font-weight="800"
          fill="#F8FAFC" letter-spacing="-2">mcp-rs-spectrum-analyzer</text>

    <!-- Tagline -->
    <text x="320" y="200" font-size="22" font-weight="500" fill="#94A3B8">
      Open-source · MCP-enabled · R&amp;S spectrum analyzer control (FSW / FSVA / FSV / FPL)
    </text>

    <!-- Keyword row -->
    <g font-size="14" font-weight="600" fill="#64748B">
      <text x="320" y="234">SCPI · VISA · ACLR · OBW · SEM · EVM · CCDF</text>
    </g>

    <!-- Surface pills: Python · MCP · License -->
    <g transform="translate(320, 256)" font-size="13" font-weight="700">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="62" height="22" rx="11" fill="#1E293B"/>
        <text x="31" y="15" fill="#F59E0B" text-anchor="middle">Python</text>
      </g>
      <g transform="translate(72, 0)">
        <rect x="0" y="0" width="50" height="22" rx="11" fill="#1E293B"/>
        <text x="25" y="15" fill="#A78BFA" text-anchor="middle">MCP</text>
      </g>
      <g transform="translate(132, 0)">
        <rect x="0" y="0" width="86" height="22" rx="11" fill="#1E293B"/>
        <text x="43" y="15" fill="#34D399" text-anchor="middle">Apache-2.0</text>
      </g>
    </g>
  </g>
</svg>
